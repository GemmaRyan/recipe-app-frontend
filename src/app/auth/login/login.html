<div class="auth-container">
  <div class="header-section">
    <h1 class="page-title">
      <mat-icon class="header-icon">login</mat-icon>
      Login
    </h1>
  </div>

  <mat-card class="auth-form-card">
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="login()">

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Email</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput formControlName="email">
        </mat-form-field>

        <div class="error-message" *ngIf="loginForm.get('email')?.touched">
          <span *ngIf="loginForm.get('email')?.hasError('required')">Email is required.</span>
          <span *ngIf="loginForm.get('email')?.hasError('email')">Invalid email format.</span>
        </div>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput type="password" formControlName="password">
        </mat-form-field>

        <div class="error-message" *ngIf="loginForm.get('password')?.touched">
          <span *ngIf="loginForm.get('password')?.hasError('required')">Password is required.</span>
        </div>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>login</mat-icon>
            Login
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
